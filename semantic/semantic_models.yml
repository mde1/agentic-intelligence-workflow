telegram_messages:
  description: >
    Raw Telegram OSINT event messages. Each row is a single source message from a
    Telegram channel. Best for message-level inspection, source review, entity
    extraction, and finding example reports behind higher-level aggregates.
  format: SQL
  database: "db/telegram_channels.db"

  grain: one row per Telegram message
  primary_time_field: message_date

  dimensions:
    message_id:
      type: identifier
      description: Unique identifier for the Telegram message

    message_date:
      type: time
      description: Timestamp when the Telegram message was posted

    channel_username:
      type: categorical
      description: Telegram channel username that published the message

    country:
      type: categorical
      description: Country inferred from message text or tagging pipeline

    event_type:
      type: categorical
      description: Normalized event label such as impact, launch, interception, or explosion

  measures:
    message_count:
      type: count
      description: Count of Telegram event messages

  analysis_hints:
    best_for:
      - raw source inspection
      - tracing example messages behind clusters
      - channel-level review
      - entity extraction
    not_ideal_for:
      - anomaly scoring
      - burst-level trend analysis
    common_filters:
      - country
      - event_type
      - channel_username
      - message_date

telegram_cluster_metrics_recent:
  description: >
    Recent burst clusters of Telegram event reports. Each row represents a short-lived
    cluster of closely timed messages for the same event type and geographic grouping.
    Clusters are useful for identifying concentrated operational activity, coordinated
    reporting bursts, and multi-channel corroboration.
  format: SQL
  database: "db/telegram_channels.db"
  semantic_purpose: >
    Use this table for recent burst activity, concentrated operational events,
    and executive-style summaries of the latest developments.


  grain: one row per event_cluster_id
  primary_time_field: cluster_start

  dimensions:
    event_cluster_id:
      type: identifier
      description: Unique cluster identifier built from event_type, geo_group, and cluster sequence

    event_type:
      type: categorical
      description: Normalized event label for all messages in the cluster

    geo_group:
      type: categorical
      description: >
        Geographic grouping key used for clustering. May represent a normalized location key,
        a country, or 'unknown' depending on clustering mode and geography extraction

    country:
      type: categorical
      description: Most common country associated with messages in the cluster

    location_key:
      type: categorical
      description: Normalized location key when clustering at the location level

    location_text:
      type: text
      description: Human-readable matched location term from message text

    cluster_start:
      type: time
      description: Timestamp of the first message in the cluster

    cluster_end:
      type: time
      description: Timestamp of the last message in the cluster

    channels:
      type: text
      description: Comma-separated list of Telegram channel usernames contributing to the cluster

    sample_text:
      type: text
      description: Representative message text from the cluster, useful for summaries and qualitative review

    entities:
      type: text
      description: Comma-separated tagged entities extracted from the cluster messages

    window_label:
      type: categorical
      description: Time window used to build the recent clusters, such as last_hour or last_day

    cluster_level:
      type: categorical
      description: >
        Geographic grouping level used to build the cluster. Usually location or country

    computed_at:
      type: time
      description: Timestamp when the cluster metrics were generated

  measures:
    message_count:
      type: sum
      description: Number of Telegram messages in the cluster

    channel_count:
      type: count_distinct
      description: Number of distinct Telegram channels contributing to the cluster

    duration_seconds:
      type: number
      description: Time span between the first and last message in the cluster

    severity_score:
      type: number
      description: >
        Heuristic importance score for the cluster, currently computed as
        message_count + 2 * channel_count

  analysis_hints:
    best_for:
      - recent burst detection
      - multi-channel corroboration
      - identifying concentrated operational activity
      - executive summaries of the latest developments
    interpretation_notes:
      - higher severity_score usually indicates a more operationally important cluster
      - channel_count helps distinguish broader corroborated activity from single-source reporting
      - cluster_level determines whether clusters are grouped by normalized location or by country
      - window_label allows comparison between shorter and longer recent periods
    derived_from:
      - telegram_messages
    common_filters:
      - window_label
      - cluster_level
      - country
      - event_type
      - severity_score
  routing_hints:
    preferred_for:
      - latest developments
      - recent incidents
      - concentrated activity
      - multi-channel corroborated bursts
    avoid_for:
      - baseline anomaly scoring
      - long historical trend analysis
    routing_keywords:
      - latest
      - recent
      - developments
      - incidents
      - bursts
      - cluster

telegram_event_hourly:
  description: >
    Hourly event aggregates derived from Telegram event messages. Each row
    summarizes event volume for one hour, one country, and one event type.
    This table is the baseline input for anomaly detection.
  format: SQL
  database: "db/telegram_channels.db"

  grain: one row per hour_bucket, country, event_type
  primary_time_field: hour_bucket

  dimensions:
    hour_bucket:
      type: time
      description: UTC hour bucket for the aggregated activity window

    country:
      type: categorical
      description: Country inferred from message text; Unknown if no geography was matched

    event_type:
      type: categorical
      description: Normalized event label grouped into the hourly aggregate

    computed_at:
      type: time
      description: Timestamp when the hourly aggregate row was generated

  measures:
    message_count:
      type: sum
      description: Number of event messages observed in that hour/country/event_type bucket

    unique_channels:
      type: count_distinct
      description: Number of distinct Telegram channels contributing messages to that hourly bucket

  analysis_hints:
    best_for:
      - hourly trend charts
      - baseline activity comparisons
      - event tempo analysis
      - cross-country and cross-event comparisons
    derived_from:
      - telegram_messages
    common_filters:
      - hour_bucket
      - country
      - event_type

telegram_hourly_anomalies:
  description: >
    Latest-hour anomaly assessment for Telegram event activity. Each row compares
    the most recent hour for a country and event type against a rolling baseline,
    typically the prior 7 days. Useful for identifying spikes, unusual surges,
    and above-baseline activity.
  format: SQL
  database: "db/telegram_channels.db"
  semantic_purpose: >
    Use this table when the user asks what activity is unusual, spiking, above
    baseline, or anomalous in the latest hourly window.


  grain: one row per latest hour_bucket, country, event_type
  primary_time_field: hour_bucket

  dimensions:
    hour_bucket:
      type: time
      description: Latest hour being evaluated for anomaly status

    country:
      type: categorical
      description: Country associated with the current-hour activity

    event_type:
      type: categorical
      description: Event type being evaluated against its historical baseline

    is_anomaly:
      type: boolean
      description: >
        Flag indicating whether the latest hour met anomaly criteria based on
        minimum volume, minimum baseline history, and either spike ratio or z-score threshold

    anomaly_reason:
      type: text
      description: >
        Human-readable explanation of why the row was flagged, such as message spike,
        channel spike, or high z-score

    computed_at:
      type: time
      description: Timestamp when anomaly metrics were computed

  measures:
    current_message_count:
      type: sum
      description: Number of event messages observed in the latest hour

    current_unique_channels:
      type: count_distinct
      description: Number of distinct channels contributing to the latest hour

    baseline_avg_messages:
      type: average
      description: Mean hourly message count over the baseline comparison window

    baseline_std_messages:
      type: number
      description: Standard deviation of hourly message count over the baseline window

    baseline_avg_channels:
      type: average
      description: Mean hourly distinct-channel count over the baseline comparison window

    baseline_std_channels:
      type: number
      description: Standard deviation of hourly distinct-channel count over the baseline window

    baseline_points:
      type: count
      description: Number of historical hourly points available for baseline comparison

    spike_ratio:
      type: ratio
      description: Current message count divided by baseline average message count

    channel_spike_ratio:
      type: ratio
      description: Current channel count divided by baseline average channel count

    zscore_messages:
      type: number
      description: Z-score of the latest message count versus historical hourly message counts

    zscore_channels:
      type: number
      description: Z-score of the latest distinct-channel count versus historical channel counts

  analysis_hints:
    best_for:
      - detecting above-baseline activity
      - prioritizing unusual country/event combinations
      - explaining why the latest hour stands out
    interpretation_notes:
      - is_anomaly usually requires enough baseline history, sufficient current volume, and either a spike ratio or z-score threshold
      - spike_ratio and zscore_messages are usually the strongest fields for prioritizing important anomalies
      - channel_spike_ratio helps distinguish broader multi-source surges from isolated chatter
    derived_from:
      - telegram_event_hourly
    common_filters:
      - is_anomaly
      - country
      - event_type
      - hour_bucket
  routing_hints:
    preferred_for:
      - anomaly detection
      - above-baseline activity
      - surge detection
      - unusual hourly activity
    avoid_for:
      - qualitative summaries of specific incidents
      - message-level source review
    routing_keywords:
      - anomaly
      - spike
      - surge
      - unusual
      - above baseline
  

news_feed_posts:
    description:
      RSS or news-feed posts stored in news_feeds.db. These posts provide
      contextual geopolitical and breaking-news coverage that can corroborate
      Telegram events, anomaly spikes, and regional developments.
    format: SQL
    database: news_feeds.db
    table: posts

    dimensions:
      id:
        type: primary_key
        description: Auto-incrementing unique identifier for each stored post

      feed_url:
        type: categorical
        description: URL of the RSS or feed source

      feed_title:
        type: categorical
        description: Human-readable title of the feed source

      guid:
        type: text
        description: Feed-provided GUID if available

      title:
        type: text
        description: Headline or title of the post

      link:
        type: text
        description: Canonical URL to the post

      published:
        type: time
        description: Original publication timestamp from the feed entry

      summary:
        type: text
        description: Feed summary, excerpt, or description text

      author:
        type: categorical
        description: Author name if provided by the feed

      category:
        type: categorical
        description: Feed category or topic label if available

      fetched_at:
        type: time
        description: Timestamp when the post was fetched and stored locally

      raw_entry:
        type: text
        description: Raw serialized feed entry for debugging or reprocessing

    metrics:
      post_count:
        type: count
        description: Number of posts

      source_count:
        type: count_distinct
        sql: feed_url
        description: Number of distinct feed sources

      author_count:
        type: count_distinct
        sql: author
        description: Number of distinct authors


