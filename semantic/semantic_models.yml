usgs_earthquakes:
  description: >
    Seismic activity from the USGS earthquake monitoring feed. Each row
    represents one earthquake event detected within the latest 24-hour feed.

  category: geophysical_events
  semantic_purpose: >
    Use this table for earthquake charts, earthquake counts, magnitude analysis,
    location-based summaries, and recent seismic activity over time.

  data_source:
    type: sqlite
    database: db/market_osint.db
    table: usgs_earthquakes

  grain: one row per earthquake event
  primary_time_field: time

  geo_fields:
    longitude:
      type: numeric
      description: Longitude of the earthquake epicenter
    latitude:
      type: numeric
      description: Latitude of the earthquake epicenter

  dimensions:
    usgs_id:
      type: identifier
      description: Unique USGS event identifier

    title:
      type: text
      description: Full USGS event title

    location:
      type: text
      description: Human-readable place description for the earthquake

    type:
      type: categorical
      description: Event type, usually earthquake

    time:
      type: time
      description: Timestamp when the earthquake occurred

    updated_time:
      type: time
      description: Timestamp when the USGS record was last updated

  measures:
    magnitude:
      type: numeric
      description: Earthquake magnitude

    depth_km:
      type: numeric
      description: Depth of the earthquake in kilometers

  routing_hints:
    preferred_for:
      - earthquake charts
      - earthquake counts
      - recent seismic activity
      - magnitude trends
      - mapping earthquakes
      - earthquake summaries by location
    avoid_for:
      - telegram anomaly analysis
      - stock price analysis
      - stock alert summaries
    routing_keywords:
      - earthquake
      - earthquakes
      - seismic
      - magnitude
      - epicenter
      - quake
      - quakes
      - tremor

  query_examples:
    - chart earthquakes from the last 24 hours
    - show the strongest earthquakes in the latest feed
    - summarize recent seismic activity
    - map earthquake magnitudes by location
  

stocks_data_long:
  description: >
    Historical daily stock prices in long format. Each row represents the price
    of a single ticker on a specific trading date. This table is ideal for
    charting trends, comparing companies, and calculating performance metrics.
  category: financial_market_data
  semantic_purpose: >
    Use this table for stock price trends, ticker comparisons, and time-series charts.

  data_source:
    type: sqlite
    database: db/market_data.db
    table: stocks_data_long

  grain: one row per ticker per date

  primary_time_field: Date

  dimensions:
    Date:
      type: time
      description: Trading date

    Ticker:
      type: categorical
      description: Stock ticker symbol

  measures:
    Price:
      type: numeric
      description: Closing or adjusted closing price for the ticker on that date

  analysis_hints:
    best_for:
      - price charts
      - ticker comparisons
      - trend analysis
      - rolling averages
      - volatility analysis

    example_questions:
      - chart NVDA over the last 30 days
      - compare AAPL and MSFT price performance
      - show the highest priced stocks in the dataset
  routing_hints:
    preferred_for:
      - stock price charts
      - comparing tickers
      - trend analysis
      - performance over time
      - moving averages
    avoid_for:
      - stock alert summaries
      - anomaly/event-style alert queries
    routing_keywords:
      - stock price
      - chart
      - compare
      - ticker
      - performance
      - trend

stocks_data_wide:
  description: >
    Historical daily stock prices in wide format where each ticker is a column.
    This table is mainly used for compatibility with spreadsheet-style analysis.
  category: financial_market_data

  data_source:
    type: sqlite
    database: db/market_data.db
    table: stocks_data_wide

  grain: one row per trading date

  primary_time_field: Date

  dimensions:
    Date:
      type: time
      description: Trading date

  measures:
    ticker_columns:
      type: numeric
      description: Each ticker column represents the price for that company on the given date

  analysis_hints:
    best_for:
      - spreadsheet style inspection
      - exporting to Excel
    not_ideal_for:
      - LLM generated charting
      - multi-stock comparisons

stock_alerts:
  description: >
    Event-style alerts generated from unusual stock behavior such as extreme
    price movements or sustained declines.
  category: financial_market_data
  semantic_purpose: >
    Use this table for alert-driven questions about unusual stock behavior,
    triggered signals, and recent market warnings.

  data_source:
    type: sqlite
    database: db/market_data.db
    table: stock_alerts

  grain: one row per ticker alert event

  primary_time_field: Date

  dimensions:
    Date:
      type: time
      description: Date the alert was triggered

    Ticker:
      type: categorical
      description: Stock ticker symbol associated with the alert

    Alert:
      type: categorical
      description: Alert category such as Spike/Drop or 3-Day Decline

  measures:
    alert_count:
      type: count
      description: Number of alerts triggered

  analysis_hints:
    best_for:
      - identifying unusual market activity
      - highlighting potential trading signals
      - summarizing recent alerts

    example_questions:
      - what stock alerts occurred this week
      - which tickers triggered the most alerts
      - show recent spike or drop alerts
  routing_hints:
    preferred_for:
      - unusual stock behavior
      - recent alerts
      - spike or drop events
      - decline alerts
    avoid_for:
      - price trend charts
      - continuous time-series analysis
    routing_keywords:
      - alert
      - unusual
      - spike
      - drop
      - decline
      - triggered